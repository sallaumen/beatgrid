services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beatgrid_dev
    # Host port 5434 (5432 = vic-api, 5433 = forrozin_page on this machine).
    ports:
      - "5434:5432"
    volumes:
      - beatgrid_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  beatgrid_pg:
